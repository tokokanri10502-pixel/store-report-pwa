<h2>🏪 TOKO 店舗視察レポート - GitHubアップロード</h2>
<p>ロピア広島パセーラ店OPEN視察レポートのデータをGitHubにアップロードします。</p>
<div style="margin-bottom:16px;">
  <label style="font-size:14px;font-weight:bold;">🔑 GitHub Token（ghp_ で始まる文字列）</label><br>
  <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxxxx" style="width:100%;padding:8px;margin-top:6px;border:1px solid #ccc;border-radius:6px;font-size:14px;">
</div>
<button onclick="runUpload()">▶ アップロード開始</button>
<div id="log">トークンを入力して「アップロード開始」をクリックしてください。</div>
<script>
function getToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) { alert('GitHubトークンを入力してください'); return null; }
  return t;
}
const REPO = "tokokanri10502-pixel/store-report-pwa";
const API = "https://api.github.com/repos/" + REPO + "/contents/";

function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += '\n<span class="' + (cls||'') + '">' + msg + '</span>';
}

async function getSHA(path) {
  const TOKEN = getToken(); if (!TOKEN) return null;
  try {
    const r = await fetch(API + path, {headers: {'Authorization':'token '+TOKEN}});
    if (r.status === 404) return null;
    const d = await r.json();
    return d.sha;
  } catch(e) { return null; }
}

async function putFile(path, content, message, sha) {
  const TOKEN = getToken(); if (!TOKEN) return { ok: false, error: 'トークン未入力' };
  const body = { message, content };
  if (sha) body.sha = sha;
  const r = await fetch(API + path, {
    method: 'PUT',
    headers: {'Authorization':'token '+TOKEN,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const d = await r.json();
  if (d.commit) return { ok: true, sha: d.commit.sha };
  return { ok: false, error: JSON.stringify(d).substring(0,200) };
}

    log('📤 アップロード中: ' + f.path, 'info');
    const result = await putFile(f.path, f.b64, f.msg, sha);
    
    if (result.ok) {
      log('✅ 成功: ' + f.path + ' (commit: ' + result.sha.substring(0,8) + ')', 'ok');
    } else {
      log('❌ エラー: ' + f.path + '\n   ' + result.error, 'err');
    }
  }
  
  log('\n🎉 完了！', 'ok');
  document.querySelector('button').disabled = false;
}
</script>
</body>
</html>
