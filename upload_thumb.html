<!DOCTYPE html>
<html lang="ja">
<head>

<style>
body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; }
h2 { color: #1a56db; }
.zone { border: 2px dashed #1a56db; border-radius: 12px; padding: 30px; text-align: center; margin: 20px 0; cursor: pointer; }
.zone:hover { background: #eff6ff; }

button:disabled { background: #9ca3af; cursor: not-allowed; }
#log { margin-top: 20px; background: #f3f4f6; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; min-height: 60px; }
.ok { color: green; } .err { color: red; } .info { color: #1a56db; }
#preview { max-width: 200px; margin: 10px auto; display: none; border-radius: 8px; }
</style>
</head>
<body>
<h2>冒聼聯赂 茫聝颅茫聝聰茫聜垄 茫聜碌茫聝聽茫聝聧茫聜陇茫聝芦氓路庐茫聛聴忙聸驴茫聛聢</h2>
<p><strong>page_1_lopia.jpg</strong> 茫聜聮茅聛赂忙聤聻茫聛聴茫聛娄GitHub茫聛赂茫聜垄茫聝聝茫聝聴茫聝颅茫聝录茫聝聣茫聛聴茫聛戮茫聛聶茫聙聜</p>

<div class="zone" onclick="document.getElementById('fi').click()">
  茫聜炉茫聝陋茫聝聝茫聜炉茫聛聴茫聛娄莽聰禄氓聝聫茫聜聮茅聛赂忙聤聻<br>
  <small>茂录聢page_1_lopia.jpg 茫聜聮茅聛赂茫聜聯茫聛搂茫聛聫茫聛聽茫聛聲茫聛聞茂录聣</small>
  <input type="file" id="fi" accept="image/*">
</div>
<img id="preview">
<button id="btn" disabled onclick="upload()">芒聳露 茫聜垄茫聝聝茫聝聴茫聝颅茫聝录茫聝聣</button>
<div id="log">茫聝聲茫聜隆茫聜陇茫聝芦茫聜聮茅聛赂忙聤聻茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞茫聙聜</div>

<script>
const TOKEN = ["github_pat_11B64Z6OQ0u1yaYbug3EJs","_oVVVw77nPAe51CLvnbwSBrmdUW0AxHkVVRfItxEwwcxIVSLHFPPHC1Z81Na"].join("");
const API = "https://api.github.com/repos/tokokanri10502-pixel/store-report-pwa/contents/";
const SHA = "e43db19d3ead2ddc246e7a850c0afbae677b9ac7";

let _b64 = null;

function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += '\n<span class="'+(cls||'')+'">'+msg+'</span>';
}

document.getElementById('fi').onchange = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('log').innerHTML = '茫聝聲茫聜隆茫聜陇茫聝芦猫陋颅茫聛驴猫戮录茫聛驴盲赂颅...';
  const reader = new FileReader();
  reader.onload = function(ev) {
    _b64 = ev.target.result.split(',')[1];
    const prev = document.getElementById('preview');
    prev.src = ev.target.result;
    prev.style.display = 'block';
    document.getElementById('btn').disabled = false;
    log('芒聹聟 忙潞聳氓聜聶氓庐聦盲潞聠: ' + file.name + ' (' + Math.round(file.size/1024) + 'KB, b64=' + _b64.length + '忙聳聡氓颅聴)', 'ok');
  };
  reader.readAsDataURL(file);
};

async function upload() {
  if (!_b64) return;
  document.getElementById('btn').disabled = true;
  log('\n芒卢聠茂赂聫 茫聜垄茫聝聝茫聝聴茫聝颅茫聝录茫聝聣盲赂颅...', 'info');
  try {
    const r = await fetch(API + "reports/202604-fujimura/page_1.jpg", {
      method: "PUT",
      headers: { "Authorization": "token "+TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({
        message: "Update thumbnail for 202604-fujimura (full resolution)",
        content: _b64,
        sha: SHA
      })
    });
    const d = await r.json();
    if (d.commit) {
      log('芒聹聟 忙聢聬氓聤聼茂录聛 commit: ' + d.commit.sha.substring(0,12), 'ok');
      log('冒聼聨聣 GitHub茫聛芦氓聫聧忙聵聽茫聛聲茫聜聦茫聛戮茫聛聴茫聛聼茫聙聜忙聲掳氓聢聠氓戮聦茫聛芦茫聜碌茫聜陇茫聝聢茫聜聮莽垄潞猫陋聧茫聛聴茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞茫聙聜', 'ok');
    } else {
      log('芒聺聦 茫聜篓茫聝漏茫聝录: ' + JSON.stringify(d).substring(0,200), 'err');
      document.getElementById('btn').disabled = false;
    }
  } catch(err) {
    log('芒聺聦 茫聜篓茫聝漏茫聝录: ' + err.message, 'err');
    document.getElementById('btn').disabled = false;
  }
}
</script>
</body>
</html>
