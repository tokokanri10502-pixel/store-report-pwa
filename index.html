<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TOKOTOKO店舗視察レポート</title>
  <meta name="theme-color" content="#1a56db">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="視察レポート">
  <link rel="apple-touch-icon" href="icon.png">
  <script src="data/reports_data.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-dark:  #1e3a8a;
      --blue-main:  #1a56db;
      --blue-mid:   #3b82f6;
      --blue-light: #dbeafe;
      --blue-pale:  #eff6ff;
      --red:        #ef4444;
      --red-pale:   #fff1f2;
      --gray-50:    #f8fafc;
      --gray-100:   #f1f5f9;
      --gray-200:   #e2e8f0;
      --gray-400:   #94a3b8;
      --gray-500:   #64748b;
      --gray-700:   #334155;
      --gray-900:   #0f172a;
      --radius:     12px;
      --shadow:     0 2px 12px rgba(26,86,219,.1);
      --shadow-lg:  0 8px 32px rgba(26,86,219,.18);
    }
    html, body { height: 100%; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: var(--gray-50); color: var(--gray-900); -webkit-font-smoothing: antialiased; }

    /* ── SCREENS ── */
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── HEADER ── */
    .app-header {
      background: linear-gradient(90deg, var(--blue-dark), var(--blue-main));
      color: #fff; padding: 0 16px; height: 56px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2);
      position: sticky; top: 0; z-index: 20;
    }
    .btn-back { background: rgba(255,255,255,.18); border: none; color: #fff; border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .btn-back svg { width: 20px; height: 20px; }
    .header-title { font-size: .95rem; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout { background: none; border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 8px; padding: 4px 10px; font-size: .75rem; cursor: pointer; white-space: nowrap; }

    /* ── LOGIN ── */
    #login-screen { background: linear-gradient(145deg, var(--blue-dark), var(--blue-main) 60%, var(--blue-mid)); align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: rgba(255,255,255,.97); border-radius: 20px; padding: 40px 32px 36px; width: 100%; max-width: 380px; box-shadow: var(--shadow-lg); text-align: center; }
    .login-icon { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .login-icon img { width: 80px; height: 80px; object-fit: contain; }
    .login-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .login-sub { font-size: .82rem; color: var(--gray-500); margin-bottom: 28px; }
    .login-label { display: block; text-align: left; font-size: .8rem; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
    .login-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-size: 1rem; outline: none; transition: border-color .2s; background: var(--gray-50); }
    .login-input:focus { border-color: var(--blue-main); background: #fff; }
    .login-btn { width: 100%; margin-top: 18px; padding: 13px; background: linear-gradient(135deg, var(--blue-main), var(--blue-mid)); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 700; cursor: pointer; }
    .login-btn:active { opacity: .85; }
    .login-error { margin-top: 12px; font-size: .82rem; color: #dc2626; display: none; }
    .login-error.show { display: block; }

    /* ── REPORTS LIST ── */
    #reports-screen { background: var(--gray-50); }
    .search-bar-wrap { background: #fff; padding: 10px 16px; border-bottom: 1px solid var(--gray-200); display: flex; gap: 8px; flex-shrink: 0; }
    .search-input { flex: 1; padding: 9px 14px; border: 1.5px solid var(--gray-200); border-radius: 20px; font-size: .85rem; outline: none; transition: border-color .2s; }
    .search-input:focus { border-color: var(--blue-main); }
    .btn-search-clear { background: var(--gray-400); border: none; color: #fff; border-radius: 50%; width: 26px; height: 26px; font-size: .8rem; cursor: pointer; display: none; flex-shrink: 0; align-self: center; }
    .btn-search-clear.show { display: flex; align-items: center; justify-content: center; }
    .filter-bar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 8px 16px; display: flex; gap: 7px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 4px 12px; border-radius: 20px; border: 1.5px solid var(--gray-200); background: #fff; color: var(--gray-500); font-size: .75rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all .15s; }
    .chip.active { background: var(--blue-main); border-color: var(--blue-main); color: #fff; }
    .chip.liked { border-color: var(--red); color: var(--red); }
    .chip.liked.active { background: var(--red); color: #fff; }
    .chip.store-chip-btn { border-color: #a855f7; color: #7c3aed; }
    .chip.store-chip-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .chip.sheet-chip-btn { border-color: #0e9f6e; color: #057a55; }
    .chip.sheet-chip-btn.active { background: #057a55; border-color: #057a55; color: #fff; }
    /* ── TAG SHEET MODAL ── */
    .tag-chips { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 8px; }
    .tnc { padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--gray-200);
           background: #fff; font-size: .85rem; cursor: pointer; transition: all .15s; color: var(--gray-700); }
    .tnc.active { background: #057a55; border-color: #057a55; color: #fff; }
    .tnc:active { opacity: .8; }
    .sheet-gen-bar { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
    #sheet-gen-btn { flex: 1; padding: 12px; border-radius: 10px; border: none;
                     background: #057a55; color: #fff; font-size: .95rem; font-weight: 600;
                     cursor: pointer; transition: opacity .15s; }
    #sheet-gen-btn:disabled { opacity: .45; cursor: default; }
    #sheet-tag-label { font-size: .8rem; color: var(--gray-500); min-width: 60px; text-align: right; }
    .list-content { flex: 1; overflow-y: auto; padding: 14px 16px; }

    /* ── STORE FILTER ACTIVE BANNER ── */
    .store-filter-banner {
      display: none; background: #f5f3ff; border-bottom: 1px solid #ddd6fe;
      padding: 8px 16px; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .store-filter-banner.show { display: flex; }
    .sfb-label { font-size: .78rem; color: #5b21b6; font-weight: 600; flex: 1; }
    .sfb-clear { background: none; border: 1px solid #a78bfa; color: #5b21b6;
      border-radius: 20px; padding: 3px 10px; font-size: .74rem; cursor: pointer; }

    /* ── STORE MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 50; display: none; align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px; width: 100%; max-height: 72vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-title { font-size: .95rem; font-weight: 700; color: var(--gray-900); }
    .modal-close {
      background: var(--gray-100); border: none; border-radius: 20px;
      padding: 5px 14px; font-size: .8rem; cursor: pointer; color: var(--gray-700);
    }
    .store-name-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .snc { padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--gray-200);
      background: #fff; color: var(--gray-700); font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .15s; text-align: left;
    }
    .snc.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .snc:active { opacity: .8; }

    /* ── REPORT CARD ── */
    .report-card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; border: 1.5px solid transparent; transition: border-color .15s, box-shadow .15s; }
    .report-card:active { border-color: var(--blue-main); box-shadow: var(--shadow-lg); }
    .report-card.hidden { display: none; }
    .rc-top { display: flex; align-items: flex-start; gap: 10px; }
    .rc-date-badge { background: var(--blue-dark); color: #fff; border-radius: 10px; padding: 6px 10px; text-align: center; flex-shrink: 0; min-width: 56px; }
    .rc-date-y { font-size: .6rem; font-weight: 600; opacity: .7; }
    .rc-date-m { font-size: .65rem; font-weight: 600; opacity: .85; }
    .rc-date-d { font-size: 1.3rem; font-weight: 800; line-height: 1; }
    .rc-info { flex: 1; min-width: 0; }
    .rc-title { font-size: .9rem; font-weight: 700; color: var(--gray-900); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rc-author { font-size: .78rem; color: var(--blue-main); font-weight: 600; margin-bottom: 4px; }
    .rc-tag-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag { background: var(--blue-pale); color: var(--blue-main); border-radius: 20px; padding: 2px 7px; font-size: .65rem; font-weight: 600; }
    .rc-bottom { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--gray-100); }
    .rc-stores-count { font-size: .76rem; color: var(--gray-500); display: flex; align-items: center; gap: 4px; }
    .rc-stores-count svg { width: 13px; height: 13px; }
    .rc-stats { display: flex; gap: 10px; margin-left: auto; font-size: .75rem; color: var(--gray-400); }
    .rc-stat { display: flex; align-items: center; gap: 3px; }
    .rc-stat svg { width: 13px; height: 13px; }
    .rc-arrow { color: var(--blue-mid); }
    .rc-arrow svg { width: 16px; height: 16px; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--gray-400); }
    .empty-state svg { width: 40px; height: 40px; margin-bottom: 8px; }
    .empty-state p { font-size: .85rem; }

    /* ── REPORT DETAIL ── */
    #report-screen { background: var(--gray-50); }
    .detail-content { flex: 1; overflow-y: auto; }

    .report-summary-card { background: linear-gradient(135deg, var(--blue-dark), var(--blue-main)); color: #fff; margin: 14px 16px; border-radius: 16px; padding: 18px; box-shadow: var(--shadow-lg); }
    .rsc-badge { display: inline-block; background: rgba(255,255,255,.22); border-radius: 20px; padding: 3px 10px; font-size: .7rem; font-weight: 600; margin-bottom: 8px; }
    .rsc-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; line-height: 1.3; }
    .rsc-meta { font-size: .78rem; opacity: .85; margin-bottom: 12px; }
    .rsc-divider { border: none; border-top: 1px solid rgba(255,255,255,.25); margin: 10px 0; }
    .rsc-purpose { font-size: .8rem; opacity: .9; line-height: 1.6; }

    .section-label { font-size: .72rem; font-weight: 700; color: var(--blue-main); letter-spacing: .08em; margin: 0 16px 8px; display: flex; align-items: center; gap: 6px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--blue-light); }

    /* ── STORE CARD ── */
    .store-card { background: #fff; border-radius: 14px; padding: 14px; margin: 0 16px 12px; box-shadow: var(--shadow); border: 1.5px solid transparent; }
    .sc-main { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .sc-main:active { opacity: .85; }
    .sc-thumb { width: 68px; height: 68px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--blue-light); }
    .sc-info { flex: 1; min-width: 0; }
    .sc-name { font-size: .92rem; font-weight: 700; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sc-time { font-size: .74rem; color: var(--blue-main); font-weight: 600; margin-bottom: 3px; }
    .sc-desc { font-size: .72rem; color: var(--gray-500); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sc-arrow { color: var(--blue-mid); flex-shrink: 0; }
    .sc-arrow svg { width: 17px; height: 17px; }
    .sc-actions { display: flex; gap: 7px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--gray-100); }
    .btn-action { display: flex; align-items: center; gap: 4px; background: none; border: 1.5px solid var(--gray-200); border-radius: 20px; padding: 5px 11px; font-size: .74rem; font-weight: 600; cursor: pointer; color: var(--gray-500); text-decoration: none; transition: all .15s; }
    .btn-action svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn-action.like { color: var(--gray-400); }
    .btn-action.like.liked { color: var(--red); border-color: #fca5a5; background: var(--red-pale); }
    .btn-action.maps { color: var(--blue-main); border-color: var(--blue-light); }
    .cmt-badge { display: flex; align-items: center; gap: 3px; font-size: .72rem; color: var(--gray-400); margin-left: auto; }
    .cmt-badge svg { width: 12px; height: 12px; }

    /* ── STORE DETAIL ── */
    #store-screen { background: var(--gray-50); }
    .store-detail-content { flex: 1; overflow-y: auto; }
    .store-img { width: 100%; display: block; }
    .store-info-card { background: #fff; padding: 16px 16px 12px; margin-bottom: 8px; }
    .si-title { font-size: 1rem; font-weight: 700; margin-bottom: 3px; }
    .si-sub { font-size: .78rem; color: var(--gray-500); margin-bottom: 14px; }
    .si-actions { display: flex; gap: 10px; }
    .btn-detail { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: var(--radius); border: 1.5px solid; font-size: .84rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: all .15s; }
    .btn-detail svg { width: 17px; height: 17px; flex-shrink: 0; }
    .btn-detail.like-d { border-color: var(--gray-200); color: var(--gray-500); background: #fff; }
    .btn-detail.like-d.liked { border-color: #fca5a5; color: var(--red); background: var(--red-pale); }
    .btn-detail.maps-d { border-color: var(--blue-light); color: var(--blue-main); background: var(--blue-pale); }

    /* ── COMMENTS ── */
    .comments-section { background: #fff; padding: 16px; margin-bottom: 8px; }
    .cmt-title { font-size: .82rem; font-weight: 700; color: var(--gray-700); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .cmt-title svg { width: 14px; height: 14px; }
    .cmt-list { margin-bottom: 12px; }
    .cmt-item { padding: 10px 12px; background: var(--gray-50); border-radius: 10px; margin-bottom: 8px; }
    .cmt-text { font-size: .82rem; color: var(--gray-900); line-height: 1.5; margin-bottom: 3px; }
    .cmt-meta { font-size: .68rem; color: var(--gray-400); }
    .cmt-del { float: right; background: none; border: none; color: var(--gray-400); font-size: .68rem; cursor: pointer; }
    .cmt-empty { font-size: .78rem; color: var(--gray-400); text-align: center; padding: 10px 0; }
    .cmt-form { display: flex; gap: 8px; }
    .cmt-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-size: .84rem; outline: none; resize: none; font-family: inherit; min-height: 40px; max-height: 90px; transition: border-color .2s; }
    .cmt-input:focus { border-color: var(--blue-main); }
    .cmt-submit { background: var(--blue-main); color: #fff; border: none; border-radius: var(--radius); padding: 0 14px; font-size: .8rem; font-weight: 700; cursor: pointer; flex-shrink: 0; }

    /* ── DELETE CONFIRM DIALOG ── */
    #delete-dialog-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 999; align-items: center; justify-content: center; }
    #delete-dialog-overlay.show { display: flex; }
    .delete-dialog { background: #fff; border-radius: 16px; padding: 24px 20px 16px; width: 280px; text-align: center; }
    .delete-dialog-title { font-size: .95rem; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; }
    .delete-dialog-msg { font-size: .82rem; color: var(--gray-500); margin-bottom: 20px; line-height: 1.5; }
    .delete-dialog-btns { display: flex; gap: 10px; }
    .delete-dialog-btns button { flex: 1; padding: 10px 0; border-radius: 10px; border: none; font-size: .88rem; font-weight: 700; cursor: pointer; }
    .btn-cancel-del { background: var(--gray-100); color: var(--gray-700); }
    .btn-confirm-del { background: #ef4444; color: #fff; }

    /* ── INSTALL BANNER ── */
    #install-banner { display: none; background: var(--blue-dark); color: #fff; padding: 10px 16px; font-size: .78rem; align-items: center; gap: 10px; flex-shrink: 0; }
    #install-banner.show { display: flex; }
    .install-text { flex: 1; line-height: 1.4; }
    .btn-install { background: #fff; color: var(--blue-dark); border: none; border-radius: 8px; padding: 6px 12px; font-size: .76rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .btn-dismiss { background: none; border: none; color: rgba(255,255,255,.6); cursor: pointer; font-size: 1.2rem; line-height: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 4px; }
  </style>
</head>
<body>

<!-- ======== LOGIN ======== -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-icon">
      <img src="icon.png" alt="TOKO ロゴ">
    </div>
    <div class="login-title">TOKO店舗視察レポート</div>
    <div class="login-sub">社内閲覧システム ・ 関係者限定</div>
    <label class="login-label" for="pw-input">パスワード</label>
    <input id="pw-input" class="login-input" type="password" placeholder="パスワードを入力" autocomplete="current-password">
    <div id="login-error" class="login-error">パスワードが違います。もう一度お試しください。</div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- ======== REPORTS LIST ======== -->
<div id="reports-screen" class="screen">
  <div class="app-header">
    <div class="header-title">TOKO店舗視察レポート</div>
    <button class="btn-logout" onclick="doLogout()">ログアウト</button>
  </div>
  <div id="install-banner">
    <div class="install-text">ホーム画面に追加するといつでも開けます</div>
    <button class="btn-install" id="btn-install-app">追加する</button>
    <button class="btn-dismiss" onclick="dismissInstall()">×</button>
  </div>
  <!-- Search -->
  <form class="search-bar-wrap" onsubmit="execSearch(event)">
    <input id="search-input" class="search-input" type="text" placeholder="作成者・部署・タグ… Enterで検索" autocomplete="off" autocorrect="off" autocapitalize="off">
    <button id="btn-search-clear" class="btn-search-clear" type="button" onclick="clearSearch()">×</button>
  </form>
  <!-- Filters -->
  <div class="filter-bar" id="filter-bar">
    <!-- chips are rendered by JS -->
  </div>
  <!-- Store filter active banner -->
  <div class="store-filter-banner" id="store-filter-banner">
    <div class="sfb-label" id="sfb-label">🏪 </div>
    <button class="sfb-clear" onclick="clearStoreFilter()">× 解除</button>
  </div>
  <div class="list-content" id="reports-list">
    <!-- report cards rendered by JS -->
  </div>
</div>

<!-- ======== REPORT DETAIL ======== -->
<div id="report-screen" class="screen">
  <div class="app-header">
    <button class="btn-back" onclick="backToReports()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="header-title" id="report-header-title" onclick="backToReports()" style="cursor:pointer; user-select:none;"></div>
  </div>
  <div class="detail-content" id="report-detail-content">
    <!-- rendered by JS -->
  </div>
</div>

<!-- ======== STORE DETAIL ======== -->
<div id="store-screen" class="screen">
  <div class="app-header">
    <button class="btn-back" onclick="backToReport()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="header-title" id="store-header-title" onclick="backToReports()" style="cursor:pointer; user-select:none;"></div>
  </div>
  <div class="store-detail-content">
    <img id="store-img" class="store-img" src="" alt="">
    <div class="store-info-card">
      <div class="si-title" id="store-detail-name"></div>
      <div class="si-sub" id="store-detail-sub"></div>
      <div class="si-actions">
        <button class="btn-detail like-d" id="like-btn-detail" onclick="toggleLikeDetail()">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const HASH = '8983ee570379fd290b174487885737b384d187d605a02f16b9a8b04bb52ea8b0'; // toko2026
let currentReportId = null;
let currentStoreId  = null;
let activeFilter      = 'all';
let searchQuery       = '';
let activeStoreName   = null; // 店舗名フィルター

// ═══════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════
async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (await sha256(pw) === HASH) {
    localStorage.setItem('auth','1');
    document.getElementById('login-error').classList.remove('show');
    showScreen('reports-screen'); initReports();
  } else {
    document.getElementById('login-error').classList.add('show');
    document.getElementById('pw-input').select();
  }
}
function doLogout() {
  localStorage.removeItem('auth');
  document.getElementById('pw-input').value = '';
  showScreen('login-screen');
}
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function backToReports() { currentReportId = null; showScreen('reports-screen'); }
function backToReport()  { currentStoreId = null; showScreen('report-screen'); }

// ═══════════════════════════════════════════════════
//  REPORTS LIST
// ═══════════════════════════════════════════════════
async function initReports() {
  buildFilterChips();
  renderReportCards();
  renderAllCardStats();
  await loadAllComments();
  renderReportCards();
  renderAllCardStats();
}

function buildFilterChips() {
  const reports = window.REPORTS_DATA || [];
  const authors = [...new Set(reports.map(r => r.author))];
  const depts   = [...new Set(reports.map(r => r.department))];

  let html = `<button class="chip active" data-f="all" onclick="setFilter('all')">すべて</button>`;
  html += `<button class="chip liked" data-f="liked" onclick="setFilter('liked')">♥ お気に入り</button>`;
  html += `<button class="chip store-chip-btn" id="chip-store" onclick="openStoreModal()">🏪 店舗名</button>`;
  html += `<button class="chip sheet-chip-btn" id="chip-sheet" onclick="openSheetModal()">📄 シート</button>`;
  authors.forEach(a => {
    html += `<button class="chip" data-f="author:${a}" onclick="setFilter('author:${a}')">${a}</button>`;
  });
  depts.forEach(d => {
    html += `<button class="chip" data-f="dept:${d}" onclick="setFilter('dept:${d}')">${d}</button>`;
  });
  document.getElementById('filter-bar').innerHTML = html;
}

// ── Store Modal ────────────────────────────────────
function openStoreModal() {
  const reports = window.REPORTS_DATA || [];
  // 全店舗名を収集（重複なし・五十音順）
  const names = [...new Set(
    reports.flatMap(r => r.stores.map(s => s.name))
  )].sort((a, b) => a.localeCompare(b, 'ja'));

  const html = names.map(name => {
    const isActive = activeStoreName === name;
    return `<button class="snc ${isActive ? 'active' : ''}" onclick="setStoreFilter('${name.replace(/'/g,"\\'")}')">
      ${name}
    </button>`;
  }).join('');
  document.getElementById('store-name-chips').innerHTML = html;
  document.getElementById('store-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeStoreModal() {
  document.getElementById('store-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function onModalOverlayClick(e) {
  if (e.target === document.getElementById('store-modal')) closeStoreModal();
}

function setStoreFilter(name) {
  activeStoreName = name;
  closeStoreModal();
  // 店舗フィルターバナー表示
  document.getElementById('sfb-label').textContent = '🏪 ' + name;
  document.getElementById('store-filter-banner').classList.add('show');
  // 店舗チップをアクティブに
  const chip = document.getElementById('chip-store');
  if (chip) chip.classList.add('active');
  renderReportCards();
}

function clearStoreFilter() {
  activeStoreName = null;
  document.getElementById('store-filter-banner').classList.remove('show');
  const chip = document.getElementById('chip-store');
  if (chip) chip.classList.remove('active');
  renderReportCards();
}

function setFilter(f) {
  activeFilter = f;
  // 店舗フィルターはリセット（他フィルターと共存させない）
  if (activeStoreName) {
    activeStoreName = null;
    document.getElementById('store-filter-banner').classList.remove('show');
    const storeChip = document.getElementById('chip-store');
    if (storeChip) storeChip.classList.remove('active');
  }
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.f === f));
  renderReportCards();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('btn-search-clear').classList.remove('show');
  renderReportCards();
  document.getElementById('search-input').focus();
}


document.getElementById('search-input').addEventListener('input', e => {
  // ×ボタンの表示/非表示だけ更新（検索はEnterまで実行しない）
  document.getElementById('btn-search-clear').classList.toggle('show', e.target.value.length > 0);
});

function execSearch(e) {
  if (e) e.preventDefault();
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  renderReportCards();
  document.getElementById('search-input').blur(); // モバイルキーボードを閉じる
}

function reportMatchesFilter(r) {
  // 店舗名フィルター
  if (activeStoreName && !r.stores.some(s => s.name === activeStoreName)) return false;
  // その他フィルター
  if (activeFilter === 'all') return true;
  if (activeFilter === 'liked') return r.stores.some(s => getLike(r.id, s.id));
  if (activeFilter.startsWith('author:')) return r.author === activeFilter.slice(7);
  if (activeFilter.startsWith('dept:'))   return r.department === activeFilter.slice(5);
  return true;
}

function reportMatchesSearch(r) {
  if (!searchQuery) return true;
  const hay = [
    r.author, r.department, r.area, r.title,
    ...(r.tags || []),
    ...r.stores.map(s => s.name),
    ...r.stores.flatMap(s => s.tags || [])
  ].join(' ').toLowerCase();
  return hay.includes(searchQuery);
}

function renderReportCards() {
  const reports = (window.REPORTS_DATA || []).slice().sort((a,b) => b.date.localeCompare(a.date));
  let html = '';
  let visibleCount = 0;

  // ── お気に入り：いいねした店舗を直接リスト表示 ──────────
  if (activeFilter === 'liked') {
    reports.forEach(r => {
      r.stores.forEach(s => {
        if (!getLike(r.id, s.id)) return;
        if (searchQuery) {
          const hay = [r.author, r.area, s.name, ...(s.tags||[])].join(' ').toLowerCase();
          if (!hay.includes(searchQuery)) return;
        }
        visibleCount++;
        const dp = r.date.split('-');
        const tagsHtml = (s.tags||[]).slice(0,4).map(t => `<span class="tag">${t}</span>`).join('');
        const cmtCount = getComments(r.id, s.id).length;
        html += `
        <div class="report-card" onclick="showStore('${r.id}','${s.id}')">
          <div class="rc-top">
            <div class="rc-date-badge">
              <div class="rc-date-y">${dp[0]}年</div>
              <div class="rc-date-m">${parseInt(dp[1])}月</div>
              <div class="rc-date-d">${dp[2].replace(/^0/,'')}</div>
            </div>
            <div class="rc-info">
              <div class="rc-title">${s.name}</div>
              <div class="rc-author">${r.author}　<span style="color:var(--gray-500);font-weight:400">${r.department}</span></div>
              <div class="rc-tag-row">${tagsHtml}</div>
            </div>
            <div class="rc-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></div>
          </div>
          <div class="rc-bottom">
            <div class="rc-stores-count" style="color:var(--red);gap:4px">
              <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              お気に入り
            </div>
            <div class="rc-stats">
              <span style="font-size:.72rem;color:var(--gray-400)">${r.area}</span>
              ${cmtCount > 0 ? `<span class="rc-stat"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>${cmtCount}</span>` : ''}
            </div>
          </div>
        </div>`;
      });
    });
    const listEl = document.getElementById('reports-list');
    if (visibleCount === 0) {
      listEl.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="var(--gray-200)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <p>まだいいねした店舗がありません</p></div>`;
    } else {
      listEl.innerHTML = html + '<div style="height:16px"></div>';
    }
    return;
  }

  // ── 通常の報告書フィルター ───────────────────────────
  reports.forEach(r => {
    const show = reportMatchesFilter(r) && reportMatchesSearch(r);
    const dateParts = r.date.split('-');
    const year  = dateParts[0] + '年';
    const month = parseInt(dateParts[1]) + '月';
    const day   = dateParts[2].replace(/^0/,'');
    const likeCount = r.stores.filter(s => getLike(r.id, s.id)).length;
    const cmtCount  = r.stores.reduce((sum, s) => sum + getComments(r.id, s.id).length, 0);
    const tagsHtml  = (r.tags||[]).slice(0,4).map(t => `<span class="tag">${t}</span>`).join('');

    // 店舗フィルター中は対象店舗を特定
    const matchedStore = activeStoreName
      ? r.stores.find(s => s.name === activeStoreName) : null;
    const onClickAction = matchedStore
      ? `showStore('${r.id}','${matchedStore.id}')`
      : `showReport('${r.id}')`;
    const storeCountLabel = matchedStore
      ? `<span style="color:#7c3aed;font-weight:700">🏪 ${matchedStore.name}</span>`
      : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4V6h16v12z"/></svg>${r.stores.length}店舗`;

    if (show) visibleCount++;
    html += `
    <div class="report-card ${show ? '' : 'hidden'}" onclick="${onClickAction}">
      <div class="rc-top">
        <div class="rc-date-badge">
          <div class="rc-date-y">${year}</div>
          <div class="rc-date-m">${month}</div>
          <div class="rc-date-d">${day}</div>
        </div>
        <div class="rc-info">
          <div class="rc-title">${r.area}</div>
          <div class="rc-author">${r.author}　<span style="color:var(--gray-500);font-weight:400">${r.department}</span></div>
          <div class="rc-tag-row">${tagsHtml}</div>
        </div>
        <div class="rc-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></div>
      </div>
      <div class="rc-bottom">
        <div class="rc-stores-count">${storeCountLabel}</div>
        <div class="rc-stats">
          ${likeCount > 0 ? `<span class="rc-stat" style="color:var(--red)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>${likeCount}</span>` : ''}
          ${cmtCount > 0 ? `<span class="rc-stat"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>${cmtCount}</span>` : ''}
        </div>
      </div>
    </div>`;
  });
  const listEl = document.getElementById('reports-list');
  if (visibleCount === 0) {
    listEl.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="var(--gray-200)"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <p>該当する報告書が見つかりません</p></div>`;
  } else {
    listEl.innerHTML = html + '<div style="height:16px"></div>';
  }
}

function renderAllCardStats() {
  // called after like/comment changes when on list screen (no-op for now; re-render on nav back)
}

// ═══════════════════════════════════════════════════
//  REPORT DETAIL
// ═══════════════════════════════════════════════════
function showReport(reportId) {
  currentReportId = reportId;

  if (!r) return;

  const purposeHtml = r.purpose.map((p,i) => `<span>${'①②③④⑤'[i]||'•'} ${p}</span>`).join('<br>');
  let html = `
    <div class="report-summary-card">
      <div class="rsc-badge">${r.dateLabel}　${r.department}</div>
      <div class="rsc-title">${r.area}</div>
      <div class="rsc-meta">👤 ${r.author}</div>
      <hr class="rsc-divider">
      <div class="rsc-purpose">${purposeHtml}</div>

    <div class="section-label" style="margin-top:4px">視察店舗 ${r.stores.length}件</div>`;

  r.stores.forEach(s => {
    const liked = getLike(r.id, s.id);

    const tagsHtml = (s.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    html += `

          <div class="sc-time">🕐 ${s.time}${s.note ? '　('+s.note+')' : ''}</div>
          <div class="sc-desc">${s.impression}</div>
        </div>
        <div class="sc-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></div>
      </div>
      <div class="sc-actions">
        <button class="btn-action like ${liked?'liked':''}" id="like-sc-${r.id}-${s.id}" onclick="toggleLikeStore('${r.id}','${s.id}')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>

        </button>
        <a class="btn-action maps" href="${s.mapsUrl}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          地図で見る
        </a>
        <div class="cmt-badge" id="cmtbadge-${r.id}-${s.id}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          <span>${cmtCount}</span>
        </div>
      </div>
    </div>`;
  });
  html += '<div style="height:24px"></div>';
  document.getElementById('report-detail-content').innerHTML = html;
  showScreen('report-screen');
}

// ═══════════════════════════════════════════════════
//  STORE DETAIL
// ═══════════════════════════════════════════════════
function showStore(reportId, storeId) {
  currentReportId = reportId;
  currentStoreId  = storeId;
  const r = (window.REPORTS_DATA||[]).find(x => x.id === reportId);
  const s = r && r.stores.find(x => x.id === storeId);
  if (!r || !s) return;

  document.getElementById('store-header-title').innerHTML = '<span style="font-size:.65rem;opacity:.75;display:block;line-height:1.2">TOKO店舗視察レポート</span>' + s.name;
  document.getElementById('store-img').src = `reports/${r.id}/page_${s.page}.jpg`;
  document.getElementById('store-img').alt = s.name;
  document.getElementById('store-detail-name').textContent = s.name;
  document.getElementById('store-detail-sub').textContent = `${r.dateLabel}　${s.time}　${s.address}`;
  document.getElementById('maps-link-detail').href = s.mapsUrl;
  renderLikeDetail();
  const cmtEl = document.getElementById('comment-list');
  if (cmtEl) cmtEl.innerHTML = '<div class="cmt-empty">読み込み中...</div>';
  loadStoreComments(reportId, storeId).then(() => renderComments(reportId, storeId));
  showScreen('store-screen');
}

function likeKey(rId, sId) { return `like_${rId}_${sId}`; }
function getLike(rId, sId) { return localStorage.getItem(likeKey(rId, sId)) === '1'; }
function setLike(rId, sId, val) { val ? localStorage.setItem(likeKey(rId,sId),'1') : localStorage.removeItem(likeKey(rId,sId)); }

function toggleLikeStore(rId, sId) {
  setLike(rId, sId, !getLike(rId, sId));
  const liked = getLike(rId, sId);
  const btn = document.getElementById(`like-sc-${rId}-${sId}`);
  const lbl = document.getElementById(`like-sc-lbl-${rId}-${sId}`);
  if (btn) { btn.classList.toggle('liked', liked); lbl.textContent = liked ? 'いいね済み' : 'いいね'; }
  if (activeFilter === 'liked') renderReportCards();
}

function toggleLikeDetail() {
  if (!currentReportId || !currentStoreId) return;
  setLike(currentReportId, currentStoreId, !getLike(currentReportId, currentStoreId));
  renderLikeDetail();
}

function renderLikeDetail() {
  const liked = getLike(currentReportId, currentStoreId);
  const btn = document.getElementById('like-btn-detail');
  document.getElementById('like-detail-label').textContent = liked ? 'いいね済み' : 'いいね';
  btn.classList.toggle('liked', liked);
}

// キャッシュ: { 'rId_sId': [{id, text, ts}, ...] }
let commentsCache = {};
function cmtCacheKey(rId, sId) { return `${rId}_${sId}`; }
function getComments(rId, sId) { return commentsCache[cmtCacheKey(rId, sId)] || []; }

async function loadAllComments() {
  const { data } = await sb.from('store_report_comments').select('*');
  commentsCache = {};
  (data || []).forEach(row => {
    const key = cmtCacheKey(row.report_id, row.store_id);
    if (!commentsCache[key]) commentsCache[key] = [];
    commentsCache[key].push({ id: row.id, text: row.text, ts: new Date(row.created_at).getTime() });
  });
}

async function loadStoreComments(rId, sId) {
  const { data } = await sb.from('store_report_comments')
    .select('*').eq('report_id', rId).eq('store_id', sId)
    .order('created_at', { ascending: true });
  commentsCache[cmtCacheKey(rId, sId)] = (data || []).map(row => ({
    id: row.id, text: row.text, ts: new Date(row.created_at).getTime()
  }));
}

async function submitComment() {
  if (!currentReportId || !currentStoreId) return;
  const inp = document.getElementById('comment-input');
  const text = inp.value.trim();
  if (!text) return;
  const { data, error } = await sb.from('store_report_comments')
    .insert({ report_id: currentReportId, store_id: currentStoreId, text })
    .select().single();
  if (error) { console.error(error); return; }
  const key = cmtCacheKey(currentReportId, currentStoreId);
  if (!commentsCache[key]) commentsCache[key] = [];
  commentsCache[key].push({ id: data.id, text: data.text, ts: new Date(data.created_at).getTime() });
  inp.value = ''; inp.style.height = 'auto';
  renderComments(currentReportId, currentStoreId);
  updateCmtBadge(currentReportId, currentStoreId);
}

let _pendingDelete = null;

function deleteComment(rId, sId, commentId) {
  _pendingDelete = { rId, sId, commentId };
  document.getElementById('delete-dialog-overlay').classList.add('show');
}

function closeDeleteDialog() {
  _pendingDelete = null;
  document.getElementById('delete-dialog-overlay').classList.remove('show');
}

async function confirmDelete() {
  if (!_pendingDelete) return;
  const { rId, sId, commentId } = _pendingDelete;
  closeDeleteDialog();
  await sb.from('store_report_comments').delete().eq('id', commentId);
  const key = cmtCacheKey(rId, sId);
  commentsCache[key] = (commentsCache[key] || []).filter(c => c.id !== commentId);
  renderComments(rId, sId);
  updateCmtBadge(rId, sId);
}

function renderComments(rId, sId) {
  const arr = getComments(rId, sId);
  const el = document.getElementById('comment-list');
  if (!el) return;
  if (arr.length === 0) { el.innerHTML = '<div class="cmt-empty">まだコメントはありません</div>'; return; }
  el.innerHTML = arr.map(c => {
    const d = new Date(c.ts);
    const ds = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="cmt-item">
      <button class="cmt-del" onclick="deleteComment('${rId}','${sId}','${c.id}')">✕</button>
      <div class="cmt-text">${esc(c.text)}</div>
      <div class="cmt-meta">${ds}</div>
    </div>`;
  }).join('');
}

function updateCmtBadge(rId, sId) {
  const cnt = getComments(rId, sId).length;
  const el = document.getElementById(`cmtbadge-${rId}-${sId}`);
  if (el) el.querySelector('span').textContent = cnt;
}

document.getElementById('comment-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); submitComment(); }
});

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

//  TAG SHEET MODAL
// ═══════════════════════════════════════════════════
let selectedSheetTag = null;

function openSheetModal() {
  const reports = window.REPORTS_DATA || [];
  // Collect all unique tags from store-level tags, sorted
  const tagSet = new Set();
  reports.forEach(r => {
    r.stores.forEach(s => {
      (s.tags || []).forEach(t => tagSet.add(t));
    });
  });
  const tags = [...tagSet].sort((a, b) => a.localeCompare(b, 'ja'));

  const html = tags.map(tag => {
    const isActive = selectedSheetTag === tag;
    return `<button class="tnc${isActive ? ' active' : ''}" onclick="selectSheetTag('${tag.replace(/'/g,"\\'")}')">
      ${tag}
    </button>`;
  }).join('');
  document.getElementById('tag-chips').innerHTML = html;
  document.getElementById('sheet-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheetModal() {
  document.getElementById('sheet-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function onSheetModalOverlayClick(e) {
  if (e.target === document.getElementById('sheet-modal')) closeSheetModal();
}

function selectSheetTag(tag) {
  selectedSheetTag = tag;
  // Update chip active state
  document.querySelectorAll('#tag-chips .tnc').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === tag);
  });
  // Count matching stores
  const count = getStoresByTag(tag).length;
  document.getElementById('sheet-tag-label').textContent = `「${tag}」${count}店舗`;
  document.getElementById('sheet-gen-btn').disabled = (count === 0);
}

function getStoresByTag(tag) {
  const reports = window.REPORTS_DATA || [];
  const items = [];
  reports.forEach(r => {
    r.stores.forEach(s => {
      if ((s.tags || []).includes(tag)) {
        items.push({ r, s });
      }
    });
  });
  return items;
}

async function generateTagSheet() {
  if (!selectedSheetTag) return;
  const items = getStoresByTag(selectedSheetTag);
  if (items.length === 0) { alert('該当する店舗がありません'); return; }

  const btn = document.getElementById('sheet-gen-btn');
  btn.disabled = true;
  btn.textContent = '生成中…';

  // Load all store images
  const loadImg = url => new Promise(res => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => res(null);
    img.src = url;
  });
  const imgList = await Promise.all(
    items.map(({ r, s }) => loadImg(`reports/${r.id}/page_${s.page}.jpg`))
  );

  // Canvas layout constants (A4 @ 150dpi)
  const DPI = 150;
  const MM2PX = DPI / 25.4;
  const PW    = Math.round(210 * MM2PX);  // ≈1240
  const PH    = Math.round(297 * MM2PX);  // ≈1754
  const MARG  = Math.round(10 * MM2PX);
  const TITLE_H = Math.round(18 * MM2PX);
  const COLS  = 3, ROWS = 2;
  const PAD   = 5;
  const CELL_W = Math.round((PW - 2 * MARG) / COLS);
  const CELL_H = Math.round((PH - 2 * MARG - TITLE_H) / ROWS);
  const LABEL_H = Math.round(9 * MM2PX);
  const FONT   = `"Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, "Yu Gothic", sans-serif`;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });

  const perPage = COLS * ROWS;
  const totalPages = Math.ceil(items.length / perPage);

  for (let pg = 0; pg < totalPages; pg++) {
    const cv = document.createElement('canvas');
    cv.width  = PW;
    cv.height = PH;
    const ctx = cv.getContext('2d');

    // Page background
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(0, 0, PW, PH);

    // Title bar
    ctx.fillStyle = '#1e3a8a';
    ctx.fillRect(0, 0, PW, MARG + TITLE_H);
    ctx.fillStyle = '#ffffff';
    const tfSize = Math.round(13 * MM2PX / 3.78);
    ctx.font = `bold ${tfSize}px ${FONT}`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    ctx.fillText(`${selectedSheetTag}　視察レポート一覧`, MARG, (MARG + TITLE_H) / 2);
    const pgFSize = Math.round(8 * MM2PX / 3.78);
    ctx.font = `${pgFSize}px ${FONT}`;
    ctx.textAlign = 'right';
    ctx.fillText(`${pg + 1} / ${totalPages}`, PW - MARG, (MARG + TITLE_H) / 2);

    // Grid cells
    for (let i = 0; i < perPage; i++) {
      const idx = pg * perPage + i;
      if (idx >= items.length) break;
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      const cx  = MARG + col * CELL_W + PAD;
      const cy  = MARG + TITLE_H + row * CELL_H + PAD;
      const cw  = CELL_W - PAD * 2;
      const ch  = CELL_H - PAD * 2;
      const imgAreaH = ch - LABEL_H;

      const img = imgList[idx];
      const { r, s } = items[idx];

      // Cell bg
      ctx.fillStyle = '#e2e8f0';
      ctx.fillRect(cx, cy, cw, ch);

      if (img) {
        const aspect = img.naturalWidth / img.naturalHeight;
        let dw = cw, dh = cw / aspect;
        if (dh > imgAreaH) { dh = imgAreaH; dw = imgAreaH * aspect; }
        const ix = cx + (cw - dw) / 2;
        ctx.drawImage(img, ix, cy, dw, dh);
      }

      // Label bar
      ctx.fillStyle = '#1e3a8a';
      ctx.fillRect(cx, cy + imgAreaH, cw, LABEL_H);

      // Label text
      const lbSize = Math.round(7.5 * MM2PX / 3.78);
      ctx.font = `${lbSize}px ${FONT}`;
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(
        `${r.author}  ${s.name}`,
        cx + cw / 2,
        cy + imgAreaH + LABEL_H / 2,
        cw - 8
      );
    }

    if (pg > 0) doc.addPage();
    doc.addImage(cv.toDataURL('image/jpeg', 0.88), 'JPEG', 0, 0, 210, 297);
  }

  doc.save(`${selectedSheetTag}_視察レポート一覧.pdf`);

  btn.disabled = false;
  btn.textContent = 'PDFを生成';
  closeSheetModal();
}
